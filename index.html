<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orthodox Mezmur Studio Console</title>
    <style>
        /* --- GOLDEN HALO STUDIO THEME --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #140d07 0%, #050301 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #f8fafc;
        }

        /* --- THE APPARATUS MAIN CONTAINER --- */
        .player-app {
            background: rgba(24, 17, 10, 0.95);
            border: 1px solid rgba(217, 119, 6, 0.25);
            border-radius: 24px;
            width: 100%;
            max-width: 440px;
            padding: 28px;
            box-shadow: 0 30px 70px -15px rgba(0, 0, 0, 0.9),
                        0 0 40px rgba(217, 119, 6, 0.05);
            position: relative;
            backdrop-filter: blur(10px);
        }

        /* --- METADATA & CANVAS --- */
        .meta-container {
            text-align: center;
            margin-bottom: 24px;
        }

        /* YouTube-inspired dynamic video thumbnail frame canvas */
        .yt-preview-canvas {
            width: 100%;
            height: 190px;
            background: linear-gradient(to bottom, #2d1a10, #130a05);
            border-radius: 16px;
            margin: 12px auto 20px auto;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(251, 191, 36, 0.2);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
        }

        /* Glowing Ember effect on video canvas background */
        .yt-preview-canvas::before {
            content: '';
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            height: 160px;
            background: radial-gradient(circle, rgba(245, 158, 11, 0.3) 0%, rgba(217, 119, 6, 0) 70%);
            filter: blur(15px);
            border-radius: 50%;
        }

        /* The Gold Stamp Badge Element */
        .yt-channel-badge {
            position: absolute;
            top: 14px;
            right: 14px;
            padding: 4px 10px;
            border: 1px solid #fbbf24;
            border-radius: 6px;
            font-size: 0.7rem;
            color: #fbbf24;
            font-weight: 700;
            background: rgba(0, 0, 0, 0.6);
            letter-spacing: 0.5px;
        }

        /* --- AUDIO VISUALIZER BARS --- */
        .visualizer-container {
            display: flex;
            align-items: flex-end;
            gap: 4px;
            height: 40px;
            margin-bottom: 10px;
            z-index: 5;
        }

        .v-bar {
            width: 4px;
            height: 5px;
            background: linear-gradient(to top, #d97706, #fbbf24);
            border-radius: 2px;
            transition: height 0.1s ease;
        }

        /* Bouncing Animation Keys for Visualizer */
        @keyframes bounce {
            0% { height: 8px; }
            50% { height: 38px; }
            100% { height: 8px; }
        }

        .player-app.is-playing .v-bar:nth-child(1) { animation: bounce 0.6s ease infinite 0.1s; }
        .player-app.is-playing .v-bar:nth-child(2) { animation: bounce 0.4s ease infinite 0.3s; }
        .player-app.is-playing .v-bar:nth-child(3) { animation: bounce 0.7s ease infinite 0.0s; }
        .player-app.is-playing .v-bar:nth-child(4) { animation: bounce 0.5s ease infinite 0.2s; }
        .player-app.is-playing .v-bar:nth-child(5) { animation: bounce 0.6s ease infinite 0.4s; }

        .song-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 6px;
            line-height: 1.3;
            z-index: 5;
        }

        .song-chanter {
            font-size: 0.85rem;
            color: #fbbf24;
            font-weight: 500;
            z-index: 5;
        }

        /* --- TIMELINE TRACK HANDLES --- */
        .timeline-box {
            margin-bottom: 24px;
        }

        .timeline-background {
            width: 100%;
            height: 6px;
            background: #2e1f14;
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            margin-bottom: 8px;
        }

        .timeline-indicator {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #d97706, #fbbf24);
            border-radius: 10px;
            position: absolute;
            top: 0;
            left: 0;
        }

        .time-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #a16207;
            font-family: monospace;
            font-weight: 600;
        }

        /* --- MEDIA MASTER CONTROLLERS --- */
        .media-controllers {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 28px;
            margin-bottom: 28px;
        }

        .ctrl-btn {
            background: transparent;
            border: none;
            color: #a16207;
            font-size: 1.7rem;
            cursor: pointer;
            transition: color 0.2s, transform 0.2s;
        }

        .ctrl-btn:hover {
            color: #fbbf24;
            transform: scale(1.1);
        }

        .ctrl-btn.toggle-btn {
            background: #fbbf24;
            color: #18110a;
            width: 58px;
            height: 58px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.3rem;
            box-shadow: 0 6px 20px rgba(251, 191, 36, 0.35);
        }

        .ctrl-btn.toggle-btn:hover {
            background: #ffffff;
            transform: scale(1.05);
        }

        /* Hardware Volume & Utility Grid */
        .utility-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #23190f;
            padding: 10px 16px;
            border-radius: 12px;
            margin-bottom: 28px;
            font-size: 0.85rem;
            border: 1px solid #2e1f14;
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .volume-range {
            width: 75px;
            accent-color: #fbbf24;
            cursor: pointer;
        }

        .toggle-switch {
            cursor: pointer;
            font-weight: 700;
            color: #78350f;
            transition: color 0.2s;
        }

        .toggle-switch.active {
            color: #34d399;
        }

        /* --- SCROLLABLE PLAYLIST CARDS --- */
        .list-header {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #a16207;
            margin-bottom: 12px;
            font-weight: 700;
        }

        /* Horizontal Scroll Container for SoundCloud Style */
        .card-carousel {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding-bottom: 14px;
            scroll-behavior: smooth;
        }

        .card-carousel::-webkit-scrollbar {
            height: 5px;
        }
        .card-carousel::-webkit-scrollbar-thumb {
            background: #3a2512;
            border-radius: 10px;
        }

        /* Singular track card styling */
        .card-node {
            flex: 0 0 110px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .card-node:hover {
            transform: translateY(-3px);
        }

        /* Rotating Vinyl Record Artwork panel */
        .card-artwork {
            width: 110px;
            height: 110px;
            background: radial-gradient(circle, #3a2512 25%, #110a04 26%, #1c1107 40%, #000000 70%);
            border-radius: 50%;
            margin-bottom: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            color: rgba(251, 191, 36, 0.4);
            border: 2px solid rgba(255,255,255,0.05);
            box-shadow: 0 6px 14px rgba(0,0,0,0.5);
            position: relative;
        }

        /* Vinyl Center Label Hole */
        .card-artwork::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            background: #fbbf24;
            border-radius: 50%;
            border: 3px solid #110a04;
        }

        /* Continuous rotation animation setup */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Only spin the vinyl when the track is explicitly selected AND app is playing */
        .player-app.is-playing .card-node.selected .card-artwork {
            animation: spin 3.5s linear infinite;
            border-color: #fbbf24;
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.25);
        }

        .card-node.selected .card-artwork {
            border-color: rgba(251, 191, 36, 0.5);
        }

        .card-song-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: #e2e8f0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
            margin-bottom: 2px;
        }

        .card-song-chanter {
            font-size: 0.75rem;
            color: #a16207;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
        }
    </style>
</head>
<body>

    <audio id="audio-platform" crossorigin="anonymous"></audio>

    <div class="player-app" id="player-container">
        <div class="meta-container">
            <div class="yt-preview-canvas">
                <div class="yt-channel-badge">ማኅቶት</div>
                
                <div class="visualizer-container">
                    <div class="v-bar"></div>
                    <div class="v-bar"></div>
                    <div class="v-bar"></div>
                    <div class="v-bar"></div>
                    <div class="v-bar"></div>
                </div>

                <h2 class="song-title" id="title-display">በድንኳኔ እልልታ ሙሉ ነው</h2>
                <div class="song-chanter" id="chanter-display">ሊቀ መዘምራን ቴዎድሮስ ዮሴፍ</div>
            </div>
        </div>

        <div class="timeline-box">
            <div class="timeline-background" id="scrub-target">
                <div class="timeline-indicator" id="progress-bar"></div>
            </div>
            <div class="time-labels">
                <span id="time-current">0:00</span>
                <span id="time-duration">0:00</span>
            </div>
        </div>

        <div class="media-controllers">
            <button class="ctrl-btn" onclick="triggerPrev()">⏮</button>
            <button class="ctrl-btn toggle-btn" id="play-state-btn" onclick="togglePlay()">▶</button>
            <button class="ctrl-btn" onclick="triggerNext()">⏭</button>
        </div>

        <div class="utility-box">
            <div class="volume-container">
                <span>🔊</span>
                <input type="range" class="volume-range" id="volume-fader" min="0" max="1" step="0.05" value="0.8" oninput="setVolume(this.value)">
            </div>
            <div class="toggle-switch active" id="autoplay-status" onclick="toggleAutoplay()">Autoplay: ON</div>
        </div>

        <div class="list-header">Mezmur Playlist</div>
        <div class="card-carousel" id="playlist-carousel">
            </div>
    </div>

    <script>
        // Media proxy gateway pipe prefix to handle cross-origin streams cleanly
        const proxyGateway = "https://api.allorigins.win/raw?url=";

        const tracks = [
            { 
                title: "በድንኳኔ እልልታ ሙሉ ነው", 
                chanter: "ሊቀ መዘምራን ቴዎድሮስ ዮሴፍ", 
                src: proxyGateway + encodeURIComponent("https://tewahedo.fra1.digitaloceanspaces.com/Mezmur/Tewodros%20Yosef/Bedenkuane%20Elelta%20Mulu%20New.mp3")
            },
            { 
                title: "አይናችን ነሽ ማርያም", 
                chanter: "ሊቀ መዘምራን ቴዎድሮስ ዮሴፍ", 
                src: proxyGateway + encodeURIComponent("https://tewahedo.fra1.digitaloceanspaces.com/Mezmur/Tewodros%20Yosef/Aynachen%20Nesh%20Mariam.mp3")
            },
            { 
                title: "እንደማንነቴማማ", 
                chanter: "ዘማሪት ምርትነሽ ጥላሁን", 
                src: proxyGateway + encodeURIComponent("https://tewahedo.fra1.digitaloceanspaces.com/Mezmur/Tewodros%20Yosef/Endemanenetema.mp3")
            },
            { 
                title: "ማርያም ማርያም", 
                chanter: "ሊቀ መዘምራን ቴዎድሮስ ዮሴፍ", 
                src: proxyGateway + encodeURIComponent("https://tewahedo.fra1.digitaloceanspaces.com/Mezmur/Tewodros%20Yosef/Mariam%20Mariam.mp3")
            }
        ];

        let index = 0;
        let playing = false;
        let autoplay = true;

        const audio = document.getElementById('audio-platform');
        const playBtn = document.getElementById('play-state-btn');
        const appContainer = document.getElementById('player-container');
        const titleDisplay = document.getElementById('title-display');
        const chanterDisplay = document.getElementById('chanter-display');
        const progressBar = document.getElementById('progress-bar');
        const timelineBg = document.getElementById('scrub-target');
        const timeCurrent = document.getElementById('time-current');
        const timeDuration = document.getElementById('time-duration');
        const playlistCarousel = document.getElementById('playlist-carousel');
        const autoplayStatus = document.getElementById('autoplay-status');

        window.addEventListener('DOMContentLoaded', () => {
            generatePlaylistCards();
            loadMezmur(index, false);
        });

        function loadMezmur(trackIndex, shouldPlay = playing) {
            const data = tracks[trackIndex];
            audio.src = data.src;
            titleDisplay.textContent = data.title;
            chanterDisplay.textContent = data.chanter;

            document.querySelectorAll('.card-node').forEach((node, idx) => {
                if(idx === trackIndex) node.classList.add('selected');
                else node.classList.remove('selected');
            });

            if (shouldPlay) {
                audio.play().catch(err => console.log("Stream synchronization pending..."));
            }
        }

        function togglePlay() {
            if (playing) {
                audio.pause();
                playBtn.textContent = "▶";
                appContainer.classList.remove('is-playing'); // Halts vinyl spinning and visualizer bars
                playing = false;
            } else {
                audio.play().catch(err => {
                    loadMezmur(index, true);
                });
                playBtn.textContent = "⏸";
                appContainer.classList.add('is-playing'); // Activates visualizer and disc spins
                playing = true;
            }
        }

        function triggerNext() {
            index = (index + 1) % tracks.length;
            loadMezmur(index, playing);
        }

        function triggerPrev() {
            index = (index - 1 + tracks.length) % tracks.length;
            loadMezmur(index, playing);
        }

        function setVolume(v) {
            audio.volume = v;
        }

        function toggleAutoplay() {
            autoplay = !autoplay;
            if(autoplay) {
                autoplayStatus.textContent = "Autoplay: ON";
                autoplayStatus.classList.add('active');
            } else {
                autoplayStatus.textContent = "Autoplay: OFF";
                autoplayStatus.classList.remove('active');
            }
        }

        function convertTime(seconds) {
            if (isNaN(seconds) || !isFinite(seconds)) return "0:00";
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return mins + ":" + (secs < 10 ? "0" : "") + secs;
        }

        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const ratio = (audio.currentTime / audio.duration) * 100;
                progressBar.style.width = ratio + "%";
            }
            timeCurrent.textContent = convertTime(audio.currentTime);
        });

        audio.addEventListener('loadedmetadata', () => {
            timeDuration.textContent = convertTime(audio.duration);
        });

        timelineBg.addEventListener('click', (e) => {
            const width = timelineBg.clientWidth;
            const clickPosition = e.offsetX;
            if (audio.duration) {
                audio.currentTime = (clickPosition / width) * audio.duration;
            }
        });

        audio.addEventListener('ended', () => {
            if (autoplay) {
                triggerNext();
            } else {
                playing = false;
                playBtn.textContent = "▶";
                appContainer.classList.remove('is-playing');
            }
        });

        function generatePlaylistCards() {
            playlistCarousel.innerHTML = "";
            tracks.forEach((track, idx) => {
                const div = document.createElement('div');
                div.className = "card-node";
                div.innerHTML = `
                    <div class="card-artwork"></div>
                    <span class="card-song-title">${track.title}</span>
                    <span class="card-song-chanter">${track.chanter.split(' ')[1] || track.chanter}</span>
                `;
                div.addEventListener('click', () => {
                    index = idx;
                    playing = true;
                    playBtn.textContent = "⏸";
                    appContainer.classList.add('is-playing');
                    loadMezmur(index, true);
                });
                playlistCarousel.appendChild(div);
            });
        }
    </script>
</body>
</html>
